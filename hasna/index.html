<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Untuk Hasna 🤍</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(180deg, #fafaf9, #f6f4f2);
        padding: 24px;
        font-family: "Inter", sans-serif;
        color: #444;
      }

      .card {
        width: 100%;
        max-width: 650px;
        background: white;
        border-radius: 24px;
        padding: 42px 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: 42px;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
      }

      .subtitle {
        color: #999;
        font-size: 15px;
        margin-bottom: 36px;
      }

      .poem {
        font-family: "Cormorant Garamond", serif;
        font-size: 34px;
        line-height: 1.75;
        color: #444;
      }

      .poem p {
        margin-bottom: 18px;
      }

      .footer {
        margin-top: 42px;
        font-size: 18px;
        line-height: 1.8;
      }

      .heart {
        font-size: 28px;
        margin-top: 28px;
      }

      .signature {
        margin-top: 40px;
        color: #888;
        font-size: 15px;
      }

      @media (max-width: 600px) {
        .card {
          padding: 32px 24px;
        }

        h1 {
          font-size: 34px;
        }

        .poem {
          font-size: 27px;
          line-height: 1.7;
        }

        .footer {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Untuk Hasna</h1>

      <div class="subtitle">Sebuah doa sederhana.</div>

      <div class="poem">
        <p>Semoga Tuhan mengangkat segala keluhmu,</p>

        <p>menguatkan tubuhmu,</p>

        <p>menenangkan hatimu,</p>

        <p>dan mengembalikan senyummu,</p>

        <p>senyum yang selalu semangati hariku.</p>
      </div>

      <div class="footer">
        Lekas sembuh, Hasna.<br /><br />

        Masih banyak hari indah<br />
        yang ingin kita jalani bersama.
      </div>

      <div class="heart">🤍</div>

      <div class="signature">— Dana</div>
    </div>
  </body>
</html>
